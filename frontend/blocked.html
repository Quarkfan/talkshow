<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>禁止访问 - 分享导航</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
.blocked-container {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; position: relative; z-index: 1;
}
.blocked-box {
  text-align: center; padding: 48px; max-width: 480px; width: 90%;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: 0 8px 40px rgba(0,0,0,.3);
}
.blocked-icon { font-size: 4rem; margin-bottom: 24px; display: block; }
.blocked-box h1 { font-size: 1.6rem; margin-bottom: 12px; }
.blocked-box p { color: var(--text-secondary); line-height: 1.7; margin-bottom: 24px; }
</style>
</head>
<body>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="blocked-container">
  <div class="blocked-box">
    <span class="blocked-icon">🔒</span>
    <h1>此内容暂未开放</h1>
    <p>该内容尚未开放或已被撤回。请联系管理员，或等待内容发布者将其设为公开后可再访问。</p>
    <a href="/" class="btn btn-primary" style="display:inline-block;text-decoration:none;padding:10px 24px">返回首页</a>
  </div>
</div>
</body>
</html>
